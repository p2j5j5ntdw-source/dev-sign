name: DevilSign
options:
  bundleIdPrefix: com.devilsign
  deploymentTarget:
    iOS: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"

packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    from: "0.9.0"

targets:
  DevilSign:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: ZIPFoundation
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Devil Sign
        CFBundleIdentifier: com.devilsign.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        LSSupportsOpeningDocumentsInPlace: true
        UIFileSharingEnabled: true
        NSDocumentsFolderUsageDescription: "يحتاج التطبيق للوصول للملفات لاستيراد شهادات IPA"
        NSFileProviderDomainUsageDescription: "يحتاج التطبيق للوصول للملفات"
        CFBundleDocumentTypes:
          - CFBundleTypeName: IPA File
            CFBundleTypeRole: Viewer
            LSItemContentTypes:
              - com.apple.itunes.ipa
            LSHandlerRank: Owner
          - CFBundleTypeName: P12 Certificate
            CFBundleTypeRole: Viewer
            LSItemContentTypes:
              - com.rsa.pkcs-12
            LSHandlerRank: Owner
          - CFBundleTypeName: Provisioning Profile
            CFBundleTypeRole: Viewer
            LSItemContentTypes:
              - com.apple.mobileprovision
            LSHandlerRank: Owner
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: com.apple.itunes.ipa
            UTTypeDescription: IPA File
            UTTypeConformsTo:
              - public.data
            UTTypeTagSpecification:
              public.filename-extension:
                - ipa
          - UTTypeIdentifier: com.rsa.pkcs-12
            UTTypeDescription: P12 Certificate
            UTTypeConformsTo:
              - public.data
            UTTypeTagSpecification:
              public.filename-extension:
                - p12
          - UTTypeIdentifier: com.apple.mobileprovision
            UTTypeDescription: Provisioning Profile
            UTTypeConformsTo:
              - public.data
            UTTypeTagSpecification:
              public.filename-extension:
                - mobileprovision
