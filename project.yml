name: DevilSign
options:
  bundleIdPrefix: com.devilsign
  deploymentTarget:
    iOS: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"

packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    from: "0.9.0"

targets:
  DevilSign:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: ZIPFoundation
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Devil Sign
        CFBundleIdentifier: com.devilsign.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        LSSupportsOpeningDocumentsInPlace: true
        UIFileSharingEnabled: true
